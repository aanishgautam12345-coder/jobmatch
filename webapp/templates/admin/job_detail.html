{% extends "base.html" %}{% block title %}Edit job — JobMatch AI{% endblock %}{% block content %}
<div class="max-w-[800px] mx-auto px-4 py-6"><h1 class="text-2xl font-bold mb-4">Edit job listing</h1><form method="POST" class="li-card p-6 space-y-3"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><label>Clean title<input class="li-input" name="title_clean" value="{{ job.title_clean or '' }}"></label><label>Company<input class="li-input" name="company" value="{{ job.company or '' }}"></label><label>Description<textarea class="li-input" rows="8" name="description">{{ job.description or '' }}</textarea></label><div class="grid sm:grid-cols-2 gap-3"><label>City<input class="li-input" name="location_city" value="{{ job.location_city or '' }}"></label><label>Country<input class="li-input" name="location_country" value="{{ job.location_country or '' }}"></label></div><label class="flex gap-2"><input type="checkbox" name="remote" {% if job.remote %}checked{% endif %}> Remote</label><select class="li-input" name="category">{% for item in categories %}<option {% if job.category == item %}selected{% endif %}>{{ item }}</option>{% endfor %}</select><input class="li-input" name="job_type" value="{{ job.job_type or '' }}" placeholder="Job type"><div class="grid sm:grid-cols-2 gap-3"><input class="li-input" type="number" min="0" step="0.01" name="salary_min" value="{{ job.salary_min or '' }}" placeholder="Minimum salary"><input class="li-input" type="number" min="0" step="0.01" name="salary_max" value="{{ job.salary_max or '' }}" placeholder="Maximum salary"></div><div class="grid sm:grid-cols-2 gap-3"><input class="li-input" name="salary_currency" value="{{ job.salary_currency or '' }}" placeholder="Currency"><input class="li-input" name="salary_period" value="{{ job.salary_period or '' }}" placeholder="Period"></div><p class="text-xs text-gray-500">Original salary: {{ job.original_salary_text or 'Not available' }} (read-only)</p><input class="li-input" name="url" value="{{ job.url or '' }}" placeholder="Job URL"><button class="li-btn-primary">Save changes</button></form>
<form method="POST" action="{{ url_for('admin.job_status', job_id=job.id) }}" class="mt-4"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input type="hidden" name="active" value="{{ 'false' if job.is_active else 'true' }}"><input type="hidden" name="confirmed" value="yes"><button class="li-btn-outline" onclick="return confirm('Are you sure?')">{{ 'Archive job' if job.is_active else 'Restore job' }}</button></form></div>{% endblock %}
