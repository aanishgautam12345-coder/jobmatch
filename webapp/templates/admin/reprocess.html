{% extends "base.html" %}{% block title %}Reprocess jobs — JobMatch AI{% endblock %}{% block content %}
<div class="max-w-[650px] mx-auto px-4 py-6"><h1 class="text-2xl font-bold mb-4">Safe raw-job reprocessing</h1><form method="POST" class="li-card p-6 space-y-4"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><input class="li-input" name="raw_job_id" placeholder="Individual raw job UUID (optional)"><input class="li-input" name="ingestion_run_id" placeholder="Ingestion run UUID (optional)"><input class="li-input" name="source" placeholder="Source (optional)"><label class="flex gap-2"><input type="checkbox" name="failed_only"> Failed or unprocessed records only</label><label class="block">Batch limit (maximum 500)<input class="li-input" type="number" min="1" max="500" name="limit" value="100"></label><label class="flex gap-2"><input type="checkbox" name="confirmed" value="yes" required> I confirm this bounded reprocessing request</label><button class="li-btn-primary">Reprocess selected records</button></form></div>{% endblock %}
