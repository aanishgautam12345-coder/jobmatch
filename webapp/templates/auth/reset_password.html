{% extends "base.html" %}
{% block title %}Choose a new password — JobMatch AI{% endblock %}
{% block content %}
<div class="flex items-center justify-center py-16 px-4"><div class="w-full max-w-[350px]"><div class="li-card p-8">
    <h1 class="text-2xl font-bold mb-6">Choose a new password</h1>
    <form method="POST" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="password" name="password" required minlength="8" class="li-input" placeholder="New password">
        <input type="password" name="confirm_password" required minlength="8" class="li-input" placeholder="Repeat new password">
        <button type="submit" class="li-btn-primary w-full py-2.5">Reset password</button>
    </form>
</div></div></div>
{% endblock %}
