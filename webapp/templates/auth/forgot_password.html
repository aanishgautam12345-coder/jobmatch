{% extends "base.html" %}
{% block title %}Reset password — JobMatch AI{% endblock %}
{% block content %}
<div class="flex items-center justify-center py-16 px-4"><div class="w-full max-w-[350px]"><div class="li-card p-8">
    <h1 class="text-2xl font-bold mb-2">Forgot password?</h1>
    <p class="text-sm text-[#00000099] mb-6">Enter your email and we will send a short-lived reset link if an account exists.</p>
    <form method="POST" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="email" name="email" required class="li-input" placeholder="you@example.com">
        <button type="submit" class="li-btn-primary w-full py-2.5">Send reset link</button>
    </form>
</div></div></div>
{% endblock %}
